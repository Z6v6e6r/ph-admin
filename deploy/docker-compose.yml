services:
  phab-api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: phab-api
    restart: unless-stopped
    env_file:
      - .env.app
    expose:
      - "3000"
    networks:
      - phab-net
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

  nodered:
    image: nodered/node-red:4.0.9
    container_name: phab-nodered
    restart: unless-stopped
    env_file:
      - .env.nodered
    ports:
      - "127.0.0.1:1880:1880"
    volumes:
      - nodered_data:/data
      - ../node-red:/opt/phab-node-red:ro
    networks:
      - phab-net

  nginx:
    image: nginx:1.27-alpine
    container_name: phab-nginx
    restart: unless-stopped
    depends_on:
      phab-api:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx/ph-ab.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - phab-net

networks:
  phab-net:
    name: phab-net

volumes:
  nodered_data:
    name: phab-nodered-data
